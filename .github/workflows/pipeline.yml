# Educational use only. Not investment advice.
#
# Required secrets:
#   HF_TOKEN      — HuggingFace API token
#   SUPABASE_URL  — Supabase project URL
#   SUPABASE_KEY  — Supabase service role key

name: Financial News Sentiment Pipeline

on:
  schedule:
    # Every 3 hours during US market hours, weekdays (9am–4pm ET = 13:00–21:00 UTC)
    - cron: '0 13 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 19 * * 1-5'
    # Weekly weight optimization — Monday 8am ET (13:00 UTC) — runs before first pipeline of the week
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Pipeline mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - backtest
      ticker:
        description: 'Ticker symbol filter (optional)'
        required: false
        default: ''
        type: string
      amount:
        description: 'Portfolio amount'
        required: false
        default: '10000'
        type: string
      risk:
        description: 'Risk tolerance'
        required: false
        default: 'moderate'
        type: choice
        options:
          - conservative
          - moderate
          - aggressive
      horizon:
        description: 'Investment horizon (months)'
        required: false
        default: '12'
        type: string

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          python -m spacy download en_core_web_sm

      - name: Validate required secrets
        run: |
          missing=()
          if [ -z "$HF_TOKEN" ]; then
            missing+=("HF_TOKEN")
          fi
          if [ -z "$SUPABASE_URL" ]; then
            missing+=("SUPABASE_URL")
          fi
          if [ -z "$SUPABASE_KEY" ]; then
            missing+=("SUPABASE_KEY")
          fi
          if [ ${#missing[@]} -gt 0 ]; then
            echo "ERROR: The following required secrets are not set: ${missing[*]}"
            echo "Please add them under Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "All required secrets are present."
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Prepare outputs directory
        run: mkdir -p outputs

      - name: Run pipeline
        run: |
          MODE="${INPUT_MODE}"
          AMOUNT="${INPUT_AMOUNT}"
          RISK="${INPUT_RISK}"
          HORIZON="${INPUT_HORIZON}"

          if ! [[ "$AMOUNT" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            echo "ERROR: 'amount' must be a number, got: $AMOUNT"
            exit 1
          fi
          if ! [[ "$HORIZON" =~ ^[0-9]+$ ]]; then
            echo "ERROR: 'horizon' must be an integer, got: $HORIZON"
            exit 1
          fi

          if [ "$MODE" = "backtest" ]; then
            START=$(date -d '1 year ago' +%Y-%m-%d)
            END=$(date +%Y-%m-%d)
            python main.py --backtest --start "$START" --end "$END"
          elif [ "$MODE" = "quick" ]; then
            export MAX_ARTICLES_PER_RUN=10
            python main.py --interactive \
              --amount "$AMOUNT" \
              --risk "$RISK" \
              --horizon "$HORIZON"
          else
            python main.py --interactive \
              --amount "$AMOUNT" \
              --risk "$RISK" \
              --horizon "$HORIZON"
          fi
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EDGAR_USER_AGENT: "stockSentimentAnalysis/1.0 github-actions@users.noreply.github.com"
          INPUT_MODE: ${{ inputs.mode || 'full' }}
          INPUT_RISK: ${{ inputs.risk || 'moderate' }}
          INPUT_AMOUNT: ${{ inputs.amount || '10000' }}
          INPUT_HORIZON: ${{ inputs.horizon || '12' }}
          INPUT_TICKER: ${{ inputs.ticker || 'none' }}

      - name: Generate dashboard data
        if: always()
        run: |
          RUN_DATE=$(date -u +%Y-%m-%d)
          OUTPUT_FILE="outputs/${RUN_DATE}.json"
          if [ -f "$OUTPUT_FILE" ]; then
            jq '{run_date: .run_date, signals: .signals, events: .events, investment_plan: .investment_plan}' \
              "$OUTPUT_FILE" > docs/latest.json
            echo "Dashboard data written: $(jq '.signals | length' docs/latest.json) signals"
          else
            echo "Output file $OUTPUT_FILE not found, skipping"
          fi

      - name: Commit and push outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ docs/latest.json
          git diff --staged --quiet || git commit -m "chore: pipeline output $(date +%Y-%m-%d)"
          git push

  optimize-weights:
    # Runs only on the Monday 8am cron (12:00 UTC) — not triggered by workflow_dispatch or other schedules
    if: github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          python -m spacy download en_core_web_sm

      - name: Run weight optimization
        run: |
          python -c "
import logging
from datetime import datetime, timedelta, timezone
logging.basicConfig(level=logging.INFO)
from config.settings import get_settings
from storage.supabase_store import SupabaseStore
from backtesting.optimizer import run_optimization
today = datetime.now(timezone.utc)
start = (today - timedelta(days=30)).strftime('%Y-%m-%d')
end = today.strftime('%Y-%m-%d')
settings = get_settings()
store = SupabaseStore(url=settings.supabase_url, key=settings.supabase_key.get_secret_value())
weights = run_optimization(store, start, end)
print('New weights:', weights)
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
